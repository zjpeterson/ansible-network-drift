all:
  vars:
    ansible_python_interpreter: auto_silent
    ansible_host: containerlab.ocpv.zach.lab

  children:
    cisco:
      vars:
        ansible_network_os: cisco.ios.ios
        ansible_connection: network_cli
      hosts:
        rtr1:
          ansible_port: 2222
    juniper:
      vars:
        ansible_network_os: juniper.device.junos
        ansible_connection: ansible.netcommon.netconf
      hosts:
        rtr3:
          ansible_port: 2225
          ansible_netconf_port: 2224
    arista:
      vars:
        ansible_network_os: arista.eos.eos
        ansible_connection: network_cli
        ansible_become: true
      hosts:
        rtr2:
          ansible_port: 2223
        rtr4:
          ansible_port: 2226

    routers:
      children:
        cisco:
        juniper:
        arista:
